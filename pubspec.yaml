name: food_safety_scanner
description: "Food Safety Scanner - 식품 성분 분석 앱"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ===== UI =====
  cupertino_icons: ^1.0.2

  # ===== 상태관리 =====
  provider: ^6.0.0

  # ===== HTTP 요청 =====
  dio: ^5.3.0

  # ===== 로컬 DB (히스토리 저장) =====
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ===== 날짜/시간 =====
  intl: ^0.19.0

  # ===== 이미지 선택 (라벨 촬영/갤러리) =====
  image_picker: ^1.1.2

  # ===== 로그 =====
  logger: ^2.5.0

  # ===== JSON 직렬화 =====
  json_serializable: ^6.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  
  # ===== 코드 생성 =====
  build_runner: ^2.4.6
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true